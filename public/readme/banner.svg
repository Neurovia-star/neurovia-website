<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="NEUROVIA animated banner">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7df4ff"/>
      <stop offset="40%" stop-color="#22e4ff"/>
      <stop offset="75%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d3cf6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22e4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#030509" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .star { animation: twinkle 3s ease-in-out infinite; }
      .star.s2 { animation-delay: 0.8s; }
      .star.s3 { animation-delay: 1.6s; }
      .star.s4 { animation-delay: 2.2s; }
      @keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.9; } }
      .glowText { animation: breathe 3.5s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: 0.35; } 50% { opacity: 0.8; } }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      .scan { animation: sweep 7s linear infinite; }
      @keyframes sweep { from { transform: translateY(-10px); } to { transform: translateY(330px); } }
      .fill { animation: load 4.5s ease-in-out infinite; }
      @keyframes load { 0% { width: 0px; } 70% { width: 240px; } 90% { width: 240px; } 100% { width: 0px; } }
    </style>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="320" rx="18" fill="#030509"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="17.5" fill="none" stroke="#22e4ff" stroke-opacity="0.18"/>

  <!-- Grid -->
  <g stroke="#7df4ff" stroke-opacity="0.05">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M150 0 V320 M300 0 V320 M450 0 V320 M600 0 V320 M750 0 V320 M900 0 V320 M1050 0 V320"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle class="star" cx="90" cy="60" r="1.4"/>
    <circle class="star s2" cx="220" cy="230" r="1.1"/>
    <circle class="star s3" cx="340" cy="90" r="1.3"/>
    <circle class="star s4" cx="480" cy="260" r="1"/>
    <circle class="star s2" cx="720" cy="50" r="1.2"/>
    <circle class="star s3" cx="860" cy="240" r="1.4"/>
    <circle class="star" cx="990" cy="80" r="1.1"/>
    <circle class="star s4" cx="1120" cy="200" r="1.3"/>
    <circle class="star s3" cx="1060" cy="280" r="1"/>
    <circle class="star" cx="160" cy="290" r="1.2"/>
  </g>

  <!-- Core glow -->
  <ellipse cx="600" cy="150" rx="360" ry="150" fill="url(#coreGlow)"/>

  <!-- Orbital rings -->
  <g>
    <circle cx="600" cy="150" r="108" fill="none" stroke="url(#neon)" stroke-opacity="0.7" stroke-width="1.4"
            stroke-linecap="round" stroke-dasharray="150 60 30 60 90 60 30 200" >
      <animateTransform attributeName="transform" type="rotate" from="0 600 150" to="360 600 150" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="150" r="92" fill="none" stroke="#22e4ff" stroke-opacity="0.45" stroke-width="1"
            stroke-linecap="round" stroke-dasharray="60 90 180 90 60 100">
      <animateTransform attributeName="transform" type="rotate" from="360 600 150" to="0 600 150" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark glow layer -->
  <text class="glowText" x="600" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="16" fill="url(#neon)" filter="url(#blurGlow)">NEUROVIA</text>
  <!-- Wordmark -->
  <text x="600" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="16" fill="url(#neon)">NEUROVIA</text>

  <!-- Subtitle + cursor -->
  <text x="600" y="212" text-anchor="middle" font-family="Consolas, Menlo, monospace"
        font-size="15" letter-spacing="7" fill="#7df4ff" fill-opacity="0.85">CYBERSECURITY // AI // CLOUD // AUTOMATION</text>
  <rect class="cursor" x="912" y="200" width="9" height="14" fill="#7df4ff"/>

  <!-- Boot bar -->
  <rect x="480" y="248" width="240" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <rect class="fill" x="480" y="248" height="3" rx="1.5" fill="url(#neon)"/>

  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="1200" height="2" fill="#22e4ff" fill-opacity="0.16"/>

  <!-- HUD corners -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" fill="none">
    <path d="M24 56 V32 a8 8 0 0 1 8 -8 H56"/>
    <path d="M1144 24 H1168 a8 8 0 0 1 8 8 V56"/>
    <path d="M24 264 V288 a8 8 0 0 0 8 8 H56"/>
    <path d="M1176 264 V288 a8 8 0 0 1 -8 8 H1144"/>
  </g>

  <!-- HUD labels -->
  <text x="44" y="46" font-family="Consolas, Menlo, monospace" font-size="11" letter-spacing="4" fill="#64748b">NEUROVIA // OS</text>
  <text x="1156" y="46" text-anchor="end" font-family="Consolas, Menlo, monospace" font-size="11" letter-spacing="4" fill="#64748b">BOOT v2.0</text>
  <text x="44" y="288" font-family="Consolas, Menlo, monospace" font-size="11" letter-spacing="4" fill="#64748b">SYS.LINK ESTABLISHED</text>
  <text x="1156" y="288" text-anchor="end" font-family="Consolas, Menlo, monospace" font-size="11" letter-spacing="4" fill="#475569">EST. 2026</text>
</svg>
