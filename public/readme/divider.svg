<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="28" viewBox="0 0 1200 28" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dneon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22e4ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22e4ff"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <style>
      .pulse { animation: dpulse 2.4s ease-in-out infinite; transform-origin: 600px 14px; }
      @keyframes dpulse { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.35); } }
    </style>
  </defs>
  <line x1="40" y1="14" x2="1160" y2="14" stroke="url(#dneon)" stroke-opacity="0.55" stroke-width="1.4"
        stroke-dasharray="14 8">
    <animate attributeName="stroke-dashoffset" from="0" to="-88" dur="3s" repeatCount="indefinite"/>
  </line>
  <rect class="pulse" x="594" y="8" width="12" height="12" transform="rotate(45 600 14)" fill="#a78bfa"/>
</svg>
